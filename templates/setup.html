<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup — OFW Pro Parenting Plan Builder</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #002b4e 0%, #005288 100%);">
        <div class="card" style="max-width: 500px; width: 100%; margin: 24px;">
            <div style="text-align: center; margin-bottom: 24px;">
                <svg width="48" height="48" viewBox="0 0 28 28" fill="none" style="margin-bottom: 12px;">
                    <rect width="28" height="28" rx="6" fill="#F5A623"/>
                    <path d="M7 14L12 19L21 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1 style="font-size: 22px; color: #002b4e;">Parenting Plan Builder</h1>
                <p style="color: #6c757d; font-size: 14px; margin-top: 4px;">Set up your firm to get started</p>
            </div>

            <form method="POST" action="/setup">
                <div class="form-group">
                    <label>Firm Name *</label>
                    <input type="text" name="firm_name" required placeholder="e.g., The Law Office of John Anderson">
                </div>
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" name="lawyer_name" required placeholder="e.g., John Anderson">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="john@andersonlaw.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" placeholder="(555) 123-4567">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">
                    Create My Account
                </button>
            </form>
        </div>
    </div>
</body>
</html>
